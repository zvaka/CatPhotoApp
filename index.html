<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="Jelena Nakarada">
    <meta name="keyword" content="">
    <meta name="description" content="">
    <meta name="viewport" content="width-device-width, initial-scale=1"
    <title></title>
  </head>

  <body>
    <h1>CatPhotoApp</h1>

     <!--HTML5 elements make your HTML easier to read and help with Search Engine Optimization (SEO) and accessibility.-->
    <main>
    <!--The section element is here to separate the cat photos content from the future content-->
    <section>
      <h2>Cat Photos</h2>
      <!--TODO: Add link to cat photos-->
      <p>Click here to view more <a href="https://freecatphotoapp.com" target="_blank">cat photos</a>.</p>
      <a href="https://freecatphotoapp.com"><img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg"
      alt="A cute orange cat lying on its back"></a>
      </section>


      <section>
        <h2>Cat Lists</h2>

        <h3>Thins cats love:</h3>
        <ul>
          <li>cat nip</li>
          <li>laser pointers</li>
          <li>lasagna</li>
        </ul>

        <!--The figure element represents self-contained content and will allow you to associate an image with a caption.-->
        <figure>
          <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/lasagna.jpg" alt="A slice of lasagna on a plate.">
          <figcaption>Cats <em>love</em> lasagna</figcaption>
        </figure>

        <h3>Top 3 things cats hate:</h3>
        <ol>
          <li>flea treatment</li>
          <li>thunder</li>
          <li>other cats</li>
        </ol>
        <figure>
          <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" alt="Five cats looking around a field">
          <figcaption>Cats <strong>hate</stonger> other cats.</figcaption>
        </figure>
      </section>

      <section>
        <h2>Cat Form</h2>

         <!-- <form action="/submit-url"></form> tells the browser that the form data should be sent to the path /submit-url
          If radio buttons do not have a value attribute, the form data will include indoor-outdoor=on,
          which is not useful when you have multiple buttons, so ADD values to every button-->

          <!--Fieldset is to group the similar input types.
          The legend element acts as a caption for the content in the fieldset element-->
        <form action="https://freecatphotoapp.com/submit-cat-photo">
         <fieldset>
          <legend>Is your cat an indoor or outdoor cat?</legend>
          <label>
            <input type="radio" id="indoor" name="indoor-outdoor" value="indoor"> Indoor
          </label>
          <label>
            <input type="radio" id="outdoor" name="indoor-outdoor" value="outdoor"> Outdoor
        </label>
        </fieldset>

        <fieldset>
          <legend>What's your cat's personality?</legend>
          <input type="checkbox" id="loving"> Loving
        </fieldset>

         <input type="text" name="catphotourl" placeholder="cat photo URL" required>
         <button type="submit">Submit</button>
       </form>

      </section>




    </main>

  </body>
</html>
